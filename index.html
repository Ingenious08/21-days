<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>🌿 Wellness Journey</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;background:#f6f2ec}
body{font-family:'Poppins',sans-serif;color:#2e2a28}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#d0c8bc;border-radius:2px}
.app{min-height:100vh;background:#f6f2ec;max-width:430px;margin:0 auto}

/* HEADER */
.hdr{background:linear-gradient(145deg,#e8f2ec 0%,#eee8f8 55%,#fdeae0 100%);padding:20px 18px 16px;border-bottom:1px solid #e0dcd4}
.hdr-inner{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.hdr-greet{font-size:12px;color:#7a9484;font-weight:500;margin-bottom:2px}
.hdr-title{font-size:21px;font-weight:700;color:#2e2a28;letter-spacing:-.4px;line-height:1.2}
.hdr-sub{font-size:11px;color:#9a9490;margin-top:3px}
.hdr-badges{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.bdg{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
.bdg-s{background:#fff8e6;color:#c07a50;border:1px solid #e8c890}
.bdg-p{background:#e8f2ec;color:#5a8a6a;border:1px solid #a8d4b4}
.hpb{height:6px;background:rgba(255,255,255,.5);border-radius:3px;overflow:hidden;margin-bottom:4px}
.hpf{height:100%;border-radius:3px;background:linear-gradient(90deg,#7abf94,#a894d0);transition:width .7s ease}
.hpl{display:flex;justify-content:space-between;font-size:10px;color:#9a9490}

/* NAV */
.nav{display:flex;background:#fff;border-bottom:1px solid #e8e2da;position:sticky;top:0;z-index:30;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px 9px;background:none;border:none;color:#b4a89e;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent}
.nb:hover{color:#6e6860}
.ne{font-size:16px;line-height:1}
.nb.on{color:#6d9e84;border-bottom-color:#6d9e84;font-weight:600}

/* MAIN */
.main{padding:16px 14px 56px}
.ani{animation:fadeUp .28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* DAY NAV */
.dnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.arr{width:38px;height:38px;border-radius:50%;border:1px solid #e0dcd4;background:#fff;color:#a0988e;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 1px 5px rgba(0,0,0,.06);line-height:1}
.arr:hover:not(:disabled){border-color:#6d9e84;color:#6d9e84}
.arr:disabled{opacity:.25;cursor:not-allowed}
.dctr{text-align:center;flex:1}
.dnr{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.dnum{font-size:20px;font-weight:700;color:#2e2a28}
.ddate{font-size:11px;color:#9a9490}
.chip{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;letter-spacing:.3px}
.ct{background:#6d9e84;color:#fff}
.cpa{background:#eaf4ee;color:#6d9e84;border:1px solid #a8d4b4}
.cf{background:#fdeae0;color:#c07a50;border:1px solid #e8c090}

/* DAY PROGRESS CARD */
.dpc{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.05);border:1px solid #ede8e0}
.dpr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.dpl{font-size:12px;color:#9a9490}
.dpp{font-size:14px;font-weight:700}
.pb{height:8px;background:#f0ece4;border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .5s ease}
.pm{font-size:12px;font-weight:600;text-align:center;margin-top:8px}

/* TASK GROUP */
.tgrp{margin-bottom:22px}
.clbl{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding-left:2px}

/* TASK CARD */
.tc{background:#fff;border:1px solid #ede8e0;border-radius:16px;margin-bottom:8px;display:flex;align-items:center;overflow:hidden;flex-wrap:wrap;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:box-shadow .2s,transform .15s;cursor:pointer;user-select:none}
.tc:active{transform:scale(.98)}
.tc:hover{box-shadow:0 4px 18px rgba(0,0,0,.08)}
.tc.done{background:#fafdf8;border-color:#cce8d4}
.tc.ex{cursor:default}
.tcb{width:4px;align-self:stretch;flex-shrink:0}
.tci{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;margin:12px 0 12px 10px}
.tbd{flex:1;padding:12px 0;min-width:0}
.tn{font-size:13px;font-weight:600;color:#2e2a28;line-height:1.3}
.tn.x{color:#6d9e84;text-decoration:line-through;text-decoration-color:#a8d4b480}
.ts{font-size:11px;color:#b4a89e;margin-top:1px}
.tck{width:26px;height:26px;border-radius:50%;border:2px solid #d8d0c8;margin-right:14px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;transition:all .2s}

/* MEALS & PILLS */
.mr{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.pill{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid #ddd8d0;background:#faf8f4;color:#9a9490;cursor:pointer;transition:all .15s;font-family:'Poppins',sans-serif;font-weight:500}
.pill:hover{border-color:#a8a09a}

/* EXPAND PANEL */
.ep{width:100%;border-top:1px solid #f0ece4;padding:14px;background:#fdfbf7}
.es{margin-bottom:14px}
.et{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#a89e94;margin-bottom:8px}
.sr{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid #f0ece4;font-size:13px;color:#3a3535;cursor:pointer;transition:opacity .1s}
.sr:first-of-type{border-top:none}
.sr:hover{opacity:.65}
.mc{width:20px;height:20px;border-radius:50%;border:1.5px solid #d0c8c0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;transition:all .2s}
.pw{display:flex;flex-wrap:wrap;gap:6px}
.mb{display:block;width:100%;background:none;border:none;font-size:12px;font-weight:600;text-align:center;cursor:pointer;margin-top:12px;padding:9px;border-radius:10px;transition:background .15s;font-family:'Poppins',sans-serif}
.mb:hover{background:#f0ece4}

/* FUTURE / LOCKED */
.fb{text-align:center;padding:52px 20px;color:#b4a89e}
.ft{font-size:16px;font-weight:700;color:#6e6860;margin-bottom:6px}

/* CALENDAR */
.stl{font-size:17px;font-weight:700;color:#2e2a28;margin-bottom:13px}
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:#9a9490}
.ld{width:9px;height:9px;border-radius:50%}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.ch{text-align:center;font-size:9px;font-weight:700;color:#b4a89e;padding:5px 0;letter-spacing:.5px}
.ce{aspect-ratio:1}
.cc{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid;padding:2px;transition:transform .15s,box-shadow .15s;position:relative}
.clk:hover{transform:scale(1.06);box-shadow:0 4px 14px rgba(0,0,0,.1);cursor:pointer}
.cnow{box-shadow:0 0 0 2px #6d9e84,0 3px 10px rgba(109,158,132,.25)}
.cdn{font-size:14px;font-weight:700;line-height:1}
.cnd{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:#6d9e84}
.cmb{width:75%;height:2px;background:#e8e0d4;border-radius:1px;margin-top:2px}
.cmf{height:100%;border-radius:1px}
.ctip{background:#fff;border:1px solid #e0dcd4;border-radius:10px;padding:8px 12px;font-size:11px;color:#6e6860;margin-bottom:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.csum{display:flex;justify-content:space-around;background:#fff;border-radius:16px;border:1px solid #e8e2da;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.si{display:flex;flex-direction:column;align-items:center;gap:4px}
.sn{font-size:26px;font-weight:800;line-height:1}
.sl{font-size:10px;color:#9a9490}

/* PROGRESS */
.pv{display:flex;flex-direction:column;gap:12px}
.ph{background:linear-gradient(145deg,#eaf4ee 0%,#eee8f8 100%);border-radius:20px;padding:24px 20px;text-align:center;border:1px solid #ddd8ec}
.pb2{font-size:60px;font-weight:800;line-height:1;margin-bottom:4px}
.psub{font-size:12px;color:#9a9490;margin-bottom:16px}
.phr{display:flex;justify-content:space-around}
.pm2{display:flex;flex-direction:column;align-items:center;gap:2px}
.pmi{font-size:20px}
.pmv{font-size:18px;font-weight:700;color:#2e2a28}
.pml{font-size:10px;color:#9a9490}
.pcard{background:#fff;border-radius:16px;border:1px solid #ede8e0;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.pct{font-size:12px;font-weight:700;color:#2e2a28;margin-bottom:13px}
.crow{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.crl{width:78px;font-size:11px;font-weight:600;flex-shrink:0}
.cb{flex:1;height:8px;background:#f0ece4;border-radius:4px;overflow:hidden}
.cbf{height:100%;border-radius:4px;transition:width .5s ease}
.cbp{width:34px;text-align:right;font-size:11px;font-weight:600;color:#9a9490}
.hr2{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.hi{font-size:18px;flex-shrink:0}
.hif{flex:1;min-width:0}
.hl{font-size:12px;font-weight:500;color:#3a3535;display:block;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hb{height:5px;background:#f0ece4;border-radius:3px;overflow:hidden}
.hbf{height:100%;border-radius:3px;transition:width .4s ease}
.hpc{width:32px;text-align:right;font-size:11px;font-weight:600;color:#9a9490}
.nn{font-size:11px;color:#c06888;font-style:italic;text-align:center;margin-top:12px;line-height:1.5}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.spi{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;border-radius:12px;border:1px solid;text-align:center}

/* PREVIOUS JOURNEY CARD */
.prev-card{border-color:#ddd8ec;background:linear-gradient(145deg,#faf8fe,#f8faf8)}
.prev-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.prev-stat{display:flex;flex-direction:column;align-items:center;gap:3px;background:#fff;border-radius:10px;padding:10px 4px;border:1px solid #ede8e0}
.prev-num{font-size:20px;font-weight:800;line-height:1}
.prev-lbl{font-size:9px;color:#9a9490;text-align:center}
.prev-bar-bg{height:6px;background:#ede8e0;border-radius:3px;overflow:hidden;margin-bottom:8px}
.prev-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#8878c0,#a894d0)}
.prev-note{font-size:11px;color:#8878c0;font-style:italic;text-align:center;line-height:1.5}

/* FINAL REPORT */
.fw{padding:20px 14px 56px}
.fh{background:linear-gradient(145deg,#e8f4ee,#ede8f8,#fdeae0);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:16px;border:1px solid #d8d0e8}
.ft2{font-size:22px;font-weight:800;color:#2e2a28;margin-bottom:6px}
.fs2{font-size:13px;color:#6e6860;line-height:1.7}
.fsg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.fsc{background:#fff;border-radius:14px;padding:14px;text-align:center;border:1px solid #ede8e0;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.fsn{font-size:28px;font-weight:800}
.fsl{font-size:10px;color:#9a9490;margin-top:3px}

/* CELEBRATION POPUP */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:9998;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ob{background:#fff;border-radius:24px;padding:32px 24px;text-align:center;max-width:320px;width:100%;position:relative;overflow:hidden;animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.obg{position:absolute;inset:0;background:linear-gradient(145deg,#eaf4ee,#f0ebfc);z-index:0}
.ocnt{position:relative;z-index:1}
.otl{font-size:22px;font-weight:800;color:#2e2a28;margin-bottom:8px}
.omsg{font-size:13px;color:#6e6860;line-height:1.6;margin-bottom:20px}
.obtn{background:linear-gradient(135deg,#6d9e84,#8878c0);color:#fff;border:none;border-radius:100px;padding:12px 32px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;transition:transform .15s;width:100%}
.obtn:hover{transform:scale(1.02)}
@keyframes cf{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(60px) rotate(360deg);opacity:0}}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:11px 24px;border-radius:100px;font-size:13px;font-weight:600;z-index:9999;background:#fff;border:1px solid #a8d4b4;color:#4a7a5a;box-shadow:0 6px 24px rgba(0,0,0,.1);white-space:nowrap;max-width:88vw;font-family:'Poppins',sans-serif;animation:fadeUp .3s ease}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

/* ── CONSTANTS ── */
const START   = new Date("2026-06-24T00:00:00");
const DAYS    = 42;
const STORAGE = "wellness42_v1";

const OIL     = new Set([1,4,7,10,13,16,19,22,25,28,31,34,37,40]);

/* ── SKINCARE ── */
const SC_AM=[{id:"sc_am1",icon:"🧼",label:"Face Wash"},{id:"sc_am2",icon:"💦",label:"Toner"},{id:"sc_am3",icon:"🧴",label:"Moisturizer"},{id:"sc_am4",icon:"☀️",label:"Sunscreen SPF"}];
const SC_PM=[{id:"sc_pm1",icon:"🌿",label:"Cleansing Oil"},{id:"sc_pm2",icon:"🧼",label:"Face Wash"},{id:"sc_pm3",icon:"💎",label:"Serum / Treatment"},{id:"sc_pm4",icon:"🌙",label:"Night Cream"}];

/* ── HAIR ── */
const OILS  =["Coconut 🥥","Argan 🌿","Castor 🍶","Olive 🫒","Almond 🌰","Bhringraj 🌺","Jojoba 🌾"];
const OTIMES=["30 min","1 hour","2 hours","4 hours","Overnight"];
const WSTEPS=[{id:"hw1",icon:"🧴",label:"Shampoo"},{id:"hw2",icon:"💆",label:"Conditioner"},{id:"hw3",icon:"🌿",label:"Hair Mask"},{id:"hw4",icon:"✨",label:"Hair Serum / Leave-in"}];

/* ── CATEGORIES ── */
const CATS={
  schedule:{label:"Daily Rhythm", color:"#6d9e84",pale:"#eaf4ee"},
  meals:   {label:"Nourishment",  color:"#c07a50",pale:"#fdf0e6"},
  mind:    {label:"Mind & Soul",  color:"#8878c0",pale:"#eee9f8"},
  body:    {label:"Movement",     color:"#5090bc",pale:"#e6f2f9"},
  beauty:  {label:"Self Care",    color:"#c06888",pale:"#fce8ef"},
};

/* ── MESSAGES ── */
const TOASTS={
  wake:    ["Rise and shine! 🌅","Morning warrior! ☀️","Early bird wins! 🌤️","The day is yours ✨"],
  sleep:   ["Wind down done! 🌙","Rest is earned 💤","Sweet dreams ✨","Recovery mode: ON 🌿"],
  meal1:   ["Breakfast done! 🍳","Morning fuel ✓ ⚡","Day started right! 🌤️"],
  meal2:   ["Midday fuel! 🥗","Lunch logged! 🌿","Energy topped up ✓"],
  meal3:   ["Three meals! 🍲","Dinner ticked! 🌆","Nutrition complete ✓"],
  reading: ["Mind fed! 📖","5 pages done! 🌱","Knowledge growing 📚"],
  writing: ["Thoughts captured! ✏️","Words on paper! ✨","Your story grows 📝"],
  exercise:["YESSS! 💪","Body moved! 🔥","Beast mode! 🏃","You showed up! ⚡"],
  skincare:["Skin glowing! ✨","Sunday ritual done! 🌸","Self care is self love 💆"],
  oiling:  ["Scalp nourished! 💧","Hair treatment done! 🌿","Oiled up beautifully 🥥"],

  def:     ["Noted! ✓","Done! 🌿","One more down ✨","Keep flowing! 🌸"],

const CHAMPS=[
  {emoji:"🎉",title:"WOHOOOO!",      msg:"Perfect day! Every single habit done. You absolute legend!"},
  {emoji:"🔥",title:"CHAMPION DAY!", msg:"100% completion! Your future self is doing a happy dance."},
  {emoji:"👑",title:"LEGENDARY!",    msg:"Not one habit skipped. That is rare. That is YOU."},
  {emoji:"✨",title:"YOU'RE GLOWING!",msg:"Every box ticked. Seriously, be proud of today."},
  {emoji:"🌟",title:"FULL MARKS!",   msg:"Perfect day unlocked. You're building a life, not just habits."},
];
const MILES={
  7: {emoji:"🌱",title:"One Week In!",      msg:"7 days of showing up. The seed is planted. Keep watering it."},
  14:{emoji:"🌿",title:"Two Weeks Strong!", msg:"14 days! Habits are forming — you can genuinely feel the shift."},
  21:{emoji:"🌸",title:"Three Weeks Done!", msg:"Halfway through! You are not the same person who started June 24."},

  42:{emoji:"👑",title:"42 DAYS COMPLETE!", msg:"SIX WEEKS. Your upgrade is complete. Look at you now. 🌟"},

/* ── HELPERS ── */
function getDate(n){const d=new Date(START);d.setDate(d.getDate()+(n-1));return d;}
function isSun(n){return getDate(n).getDay()===0;}
function fmtLong(n){return getDate(n).toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long"});}
function getTasks(n){
  const t=[
    {id:"wake",    icon:"🌅",label:"Wake Up",       sub:"7–8 AM",             cat:"schedule"},
    {id:"sleep",   icon:"🌙",label:"Wind Down",      sub:"Sleep by 12–1 AM",   cat:"schedule"},
    {id:"meal1",   icon:"🍳",label:"Breakfast",                                cat:"meals",isMeal:true},

function getCurDay(){
  const now=new Date();now.setHours(0,0,0,0);
  const st=new Date(START);st.setHours(0,0,0,0);
  return Math.floor((now-st)/86400000)+1;
}
function calcOldStats(old){
  if(!old)return null;
  let done=0,total=0,perf=0,bestS=0,cur=0;
  for(let d=1;d<=21;d++){
    const s=old[d]?.tasks||{};
    const ids=Object.keys(s);
    if(!ids.length)continue;
    const dc=ids.filter(id=>s[id]?.done).length;
    total+=ids.length;done+=dc;
    const p=ids.length?dc/ids.length:0;
    if(p===1)perf++;
    if(p>=0.6){cur++;bestS=Math.max(bestS,cur);}else cur=0;
  }
  return total>0?{done,total,pct:Math.round(done/total*100),perf,streak:bestS}:null;
}
const DOW=["Su","Mo","Tu","We","Th","Fr","Sa"];

/* ── ROOT APP ── */
function App(){
  const [data,   setData]  =useState({});
  const [oldData,setOld]   =useState(null);
  const [tab,    setTab]   =useState("today");
  const [vDay,   setVDay]  =useState(null);
  const [loaded, setLoaded]=useState(false);
  const [toast,  setToast] =useState(null);
  const [cel,    setCel]   =useState(null);
  const [shownM, setShownM]=useState({});
  const tRef=useRef(null),cRef=useRef(null);

  const curDay=getCurDay();
  const display=vDay??Math.max(1,Math.min(Math.max(curDay,1),DAYS));

  useEffect(()=>{
    try{
      const r=localStorage.getItem(STORAGE);if(r)setData(JSON.parse(r));
      const o=localStorage.getItem(OLD_KEY); if(o)setOld(JSON.parse(o));
      const m=localStorage.getItem("w42_m"); if(m)setShownM(JSON.parse(m));
    }catch{}
    setLoaded(true);
  },[]);

  useEffect(()=>{if(!loaded)return;try{localStorage.setItem(STORAGE,JSON.stringify(data));}catch{}},[data,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("w42_m",JSON.stringify(shownM));}catch{}},[shownM,loaded]);

  useEffect(()=>{
    if(!loaded)return;
    const ms=MILES[display];
    if(ms&&!shownM[display]){setCel({...ms,isMile:true});setShownM(p=>({...p,[display]:true}));}
  },[display,loaded]);

  const showToast=useCallback((msg)=>{
    clearTimeout(tRef.current);
    setToast({msg,id:Date.now()});
    tRef.current=setTimeout(()=>setToast(null),2600);
  },[]);

  const toggle=useCallback((dn,tid)=>{
    setData(prev=>{
      const day=prev[dn]||{tasks:{}};
      const tasks={...(day.tasks||{})};
      const was=!!tasks[tid]?.done;
      tasks[tid]={...tasks[tid],done:!was};
      if(!was){
        const msgs=TOASTS[tid]||TOASTS.def;
        showToast(msgs[Math.floor(Math.random()*msgs.length)]);
        const all=getTasks(dn);
        const dc=all.filter(t=>t.id===tid?true:tasks[t.id]?.done).length;
        if(dc===all.length){clearTimeout(cRef.current);cRef.current=setTimeout(()=>{setCel({...CHAMPS[Math.floor(Math.random()*CHAMPS.length)],isChamp:true});},400);}
      }
      return{...prev,[dn]:{...day,tasks}};
    });
  },[showToast]);

  const upd=useCallback((dn,tid,f,v)=>{
    setData(prev=>{
      const day=prev[dn]||{tasks:{}};
      const tasks={...(day.tasks||{}),[tid]:{...(day.tasks?.[tid]||{}),[f]:v}};
      return{...prev,[dn]:{...day,tasks}};
    });
  },[]);

  const stat=(()=>{
    let done=0,total=0;
    for(let d=1;d<=DAYS;d++){const t=getTasks(d),s=data[d]?.tasks||{};total+=t.length;done+=t.filter(tk=>s[tk.id]?.done).length;}
    return{done,total,pct:total>0?Math.round(done/total*100):0};
  })();

  const streak=(()=>{
    let cur=0;
    for(let d=1;d<=Math.min(curDay,DAYS);d++){
      const t=getTasks(d),s=data[d]?.tasks||{};
      const p=t.length?t.filter(tk=>s[tk.id]?.done).length/t.length:0;
      if(p>=0.6)cur++;else if(d<curDay)cur=0;
    }
    return cur;
  })();

  const dayComp=(d)=>{const t=getTasks(d),s=data[d]?.tasks||{};const done=t.filter(tk=>s[tk.id]?.done).length;return{done,total:t.length,pct:t.length?done/t.length:0};};

  const greet=(()=>{const h=new Date().getHours();if(h<12)return"Good morning 🌸";if(h<17)return"Good afternoon ☀️";if(h<21)return"Good evening 🌙";return"Good night ✨";})();
  const jpct=Math.max(0,Math.min(100,(Math.max(curDay-1,0)/DAYS)*100));

  if(curDay>DAYS)return(<div className="app"><FinalReport data={data} oldData={oldData} dayComp={dayComp}/></div>);

  return(
    <div className="app">
      <header className="hdr">
        <div className="hdr-inner">
          <div>
            <p className="hdr-greet">{greet}</p>
            <h1 className="hdr-title">Wellness Journey ✦</h1>
            <p className="hdr-sub">{curDay<=0?"New cycle begins Jun 24 🌿":curDay>DAYS?"Journey complete! 🌟":`Day ${curDay} of 42 · Your Upgrade 🚀`}</p>
          </div>
          <div className="hdr-badges">
            <div className="bdg bdg-s">🔥 {streak} streak</div>
            <div className="bdg bdg-p">{stat.pct}% done</div>
          </div>
        </div>
        <div className="hpb"><div className="hpf" style={{width:`${jpct}%`}}/></div>
        <div className="hpl"><span>Jun 24</span><span>Day 42 · Aug 4</span></div>
      </header>

      <nav className="nav">
        {[{id:"today",l:"Today",e:"🌿"},{id:"cal",l:"Calendar",e:"📅"},{id:"prog",l:"Progress",e:"📊"}].map(t=>(
          <button key={t.id} className={`nb${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>
            <span className="ne">{t.e}</span><span>{t.l}</span>
          </button>
        ))}
      </nav>

      <main className="main">
        {tab==="today"&&<TodayView day={display} curDay={curDay} data={data} toggle={toggle} upd={upd} setVDay={setVDay}/>}
        {tab==="cal"  &&<CalView   curDay={curDay} dayComp={dayComp} onClick={(d)=>{setVDay(d);setTab("today");}}/>}
        {tab==="prog" &&<ProgView  data={data} oldData={oldData} curDay={curDay} stat={stat} streak={streak} dayComp={dayComp}/>}
      </main>

      {cel  &&<CelPopup d={cel} onClose={()=>setCel(null)}/>}
      {toast&&<div key={toast.id} className="toast">{toast.msg}</div>}
    </div>
  );
}

      )}

      <div className="pcard">
        <p className="pct">By Category</p>
        {Object.entries(catS).length===0
          ?<p style={{color:"#b0a89e",fontSize:13,textAlign:"center",padding:"12px 0"}}>Start logging to see your breakdown!</p>
          :Object.entries(catS).map(([cat,{done,total}])=>{const p=total?done/total*100:0;return(
            <div key={cat} className="crow"><span className="crl" style={{color:CATS[cat].color}}>{CATS[cat].label}</span><div className="cb"><div className="cbf" style={{width:`${p}%`,background:CATS[cat].color}}/></div><span className="cbp">{Math.round(p)}%</span></div>
          );})}
      </div>

      {best.some(t=>t.done>0)&&(
        <div className="pcard">
          <p className="pct">💚 Strongest Habits</p>
          {best.filter(t=>t.done>0).map((t,i)=>{const p=Math.round(t.done/t.total*100);return(
            <div key={i} className="hr2"><span className="hi">{t.icon}</span><div className="hif"><span className="hl">{t.label}</span><div className="hb"><div className="hbf" style={{width:`${p}%`,background:"#6d9e84"}}/></div></div><span className="hpc">{p}%</span></div>
          );})}
        </div>
      )}

      {needs.length>0&&(
        <div className="pcard" style={{borderColor:"#f8e4ec"}}>
          <p className="pct">🌱 Give These More Love</p>
          {needs.map((t,i)=>{const p=Math.round(t.done/t.total*100);return(
            <div key={i} className="hr2"><span className="hi">{t.icon}</span><div className="hif"><span className="hl">{t.label}</span><div className="hb"><div className="hbf" style={{width:`${p}%`,background:"#c06888"}}/></div></div><span className="hpc">{p}%</span></div>
          );})}
          <p className="nn">Progress, not perfection. Be gentle with yourself 🌸</p>
        </div>
      )}

      <div className="pcard">
        <p className="pct">🗓️ Special Days This Cycle</p>
        <div className="sg">
          {[{e:"✨",l:"Skincare",s:"Every Sunday",bg:"#fce8ef",bc:"#e0b4c4"},{e:"💧",l:"Hair Oil",s:"Every 3 days",bg:"#fdf0e6",bc:"#e8c8a0"},{e:"🚿",l:"Hair Wash",s:"Day after oil",bg:"#eaf4ee",bc:"#a8d4b4"}]
            .map(x=><div key={x.l} className="spi" style={{background:x.bg,borderColor:x.bc}}><span style={{fontSize:20}}>{x.e}</span><span style={{fontWeight:600,fontSize:11}}>{x.l}</span><span style={{fontSize:10,color:"#9a9490"}}>{x.s}</span></div>)}
        </div>
      </div>

      {logged===0&&(
        <div className="pcard" style={{textAlign:"center",padding:"32px 20px"}}>
          <div style={{fontSize:52,marginBottom:12}}>🌿</div>
          <p style={{fontSize:16,fontWeight:700,color:"#2e2a28",marginBottom:8}}>Your upgrade begins today</p>
          <p style={{fontSize:13,color:"#9a9490",lineHeight:1.7}}>An upgrade. A chance to improve.<br/>Start ticking off habits and watch this page bloom.</p>
        </div>
      )}
    </div>
  );
}

/* ── FINAL REPORT ── */
function FinalReport({data,oldData,dayComp}){
  let done=0,total=0,perf=0,bestS=0,cur=0;
  for(let d=1;d<=DAYS;d++){
    const t=getTasks(d),s=data[d]?.tasks||{};
    const dc=t.filter(tk=>s[tk.id]?.done).length;
    total+=t.length;done+=dc;
    const p=t.length?dc/t.length:0;
    if(p===1)perf++;
    if(p>=0.6){cur++;bestS=Math.max(bestS,cur);}else cur=0;
  }
  const pct=total>0?Math.round(done/total*100):0;
  const catS={};
  for(let d=1;d<=DAYS;d++){getTasks(d).forEach(t=>{catS[t.cat]=catS[t.cat]||{done:0,total:0,label:CATS[t.cat].label,color:CATS[t.cat].color};catS[t.cat].total++;if(data[d]?.tasks?.[t.id]?.done)catS[t.cat].done++;});}
  const topCat=Object.values(catS).sort((a,b)=>(b.done/b.total)-(a.done/a.total))[0];
  const hc=pct>=70?"#6d9e84":pct>=40?"#c07a50":"#c06888";
  const oldStats=calcOldStats(oldData);
  return(
    <div className="fw">
      <div className="fh">
        <div style={{fontSize:60,marginBottom:12}}>👑</div>
        <h1 className="ft2">42 Days Complete!</h1>
        <p className="fs2">Six weeks of showing up, every single day.<br/>You are genuinely not the same person who started. 🌟</p>
      </div>
      <div className="fsg">
        {[{v:`${pct}%`,l:"Overall",i:"🏆",c:hc},{v:perf,l:"Perfect Days",i:"🌟",c:"#8878c0"},{v:bestS,l:"Best Streak",i:"🔥",c:"#c07a50"},{v:done,l:"Tasks Done",i:"✓",c:"#5090bc"}]
          .map(x=><div key={x.l} className="fsc"><div style={{fontSize:22,marginBottom:4}}>{x.i}</div><div className="fsn" style={{color:x.c}}>{x.v}</div><div className="fsl">{x.l}</div></div>)}
      </div>
      {oldStats&&(
        <div className="pcard" style={{marginBottom:12}}>
          <p className="pct">📈 Cycle 1 vs Cycle 2</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            <div style={{background:"#ede9f8",borderRadius:12,padding:14,textAlign:"center",border:"1px solid #c8b8e0"}}>
              <div style={{fontSize:26,fontWeight:800,color:"#8878c0"}}>{oldStats.pct}%</div>
              <div style={{fontSize:11,color:"#8878c0",marginTop:4}}>🌱 Cycle 1<br/>May 25 – Jun 14</div>
            </div>
            <div style={{background:"#eaf4ee",borderRadius:12,padding:14,textAlign:"center",border:"1px solid #a8d4b4"}}>
              <div style={{fontSize:26,fontWeight:800,color:"#6d9e84"}}>{pct}%</div>
              <div style={{fontSize:11,color:"#6d9e84",marginTop:4}}>🚀 Cycle 2<br/>Jun 24 – Aug 4</div>
            </div>
          </div>
          <p style={{fontSize:12,color:"#6e6860",textAlign:"center",fontStyle:"italic"}}>
            {pct>oldStats.pct?`You improved by ${pct-oldStats.pct}% from your first cycle. That's growth. 🌱`:
             pct===oldStats.pct?"Consistent across both cycles. Solid. 💪":
             "Every journey teaches something. You showed up — that's what matters. 🌸"}
          </p>
        </div>
      )}
      <div className="pcard" style={{marginBottom:12}}>
        <p className="pct">📊 Category Results</p>
        {Object.values(catS).map(cat=>{const p=cat.total?cat.done/cat.total*100:0;return(
          <div key={cat.label} className="crow"><span className="crl" style={{color:cat.color}}>{cat.label}</span><div className="cb"><div className="cbf" style={{width:`${p}%`,background:cat.color}}/></div><span className="cbp">{Math.round(p)}%</span></div>
        );})}
        {topCat&&<p style={{fontSize:12,color:"#6d9e84",fontWeight:600,textAlign:"center",marginTop:10}}>🏅 Best: {topCat.label} ({Math.round(topCat.done/topCat.total*100)}%)</p>}
      </div>
      <div className="pcard" style={{textAlign:"center",padding:"24px 20px",background:"linear-gradient(135deg,#eaf4ee,#ede8f8)",borderColor:"#c8c0e0"}}>
        <div style={{fontSize:36,marginBottom:10}}>🌸</div>
        <p style={{fontSize:15,fontWeight:700,color:"#2e2a28",marginBottom:10}}>What you built in 42 days:</p>
        <p style={{fontSize:13,color:"#6e6860",lineHeight:1.9}}>A body that moves · A mind that reads<br/>A pen that writes · Skin that glows<br/>Hair that's nourished · Meals that fuel you<br/>A sleep rhythm · A morning ritual</p>
        <p style={{fontSize:14,fontWeight:700,color:"#8878c0",marginTop:16}}>That's not a tracker. That's a new you. 🌟</p>
      </div>
    </div>
  );
}

/* ── CELEBRATION POPUP ── */
function CelPopup({d,onClose}){
  const conf=["🌸","⭐","✨","🌟","💫","🎊","🌺","🎉"];
  return(
    <div className="ov" onClick={onClose}>
      <div className="ob" onClick={e=>e.stopPropagation()}>
        <div className="obg"/>
        <div className="ocnt">
          <span style={{fontSize:56,marginBottom:10,display:"block"}}>{d.emoji||"🎉"}</span>
          <div style={{display:"flex",justifyContent:"space-around",marginBottom:12,fontSize:18}}>
            {conf.map((c,i)=><span key={i} style={{display:"inline-block",animation:`cf 1.2s ${i*0.08}s ease-in forwards`}}>{c}</span>)}
          </div>
          <h2 className="otl">{d.title}</h2>
          <p className="omsg">{d.msg}</p>
          <button className="obtn" onClick={onClose}>{d.isChamp?"Keep glowing! ✨":"Let's do this! →"}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(
  <App />,
  document.getElementById('root')
);
</script>
